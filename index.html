<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="manualTitleTag">NPS Fast Tennis · Manual</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style id="themeCustomStyles">
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --azul: #1E46C5;
            --verde: #19F000;
            --branco: #FFFFFF;
            --cinza-claro: #D9D9D9;
            --cinza-fundo: #F4F6FA;
            --texto-escuro: #1A1A2E;
            --sombra: 0 8px 30px rgba(30, 70, 197, 0.10);
            --radius: 20px;
            --menu-bg: #FFFFFF;
            --btn-color: #1E46C5;
            --bg-custom-image: none;
        }

        body.dark-theme {
            --cinza-fundo: #0F172A;
            --branco: #1E293B;
            --texto-escuro: #F8FAFC;
            --cinza-claro: #334155;
            --menu-bg: #1E293B;
            --sombra: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        body.dark-theme .sidebar, body.dark-theme .section, body.dark-theme .modal-box {
            background-color: #1E293B !important;
            color: #F8FAFC !important;
        }
        body.dark-theme .subsection p, body.dark-theme .subsection li {
            color: #CBD5E1 !important;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--cinza-fundo);
            background-image: var(--bg-custom-image);
            background-size: cover;
            background-attachment: fixed;
            color: var(--texto-escuro);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .topbar {
            background: var(--azul);
            color: white;
            padding: 0.6rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(30, 70, 197, 0.3);
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
        }
        .logo-wrapper { display: flex; align-items: center; gap: 0.75rem; cursor: default; }
        .logo-container {
            width: 64px; height: 64px; border-radius: 12px; background: var(--branco);
            display: flex; align-items: center; justify-content: center; position: relative;
            overflow: hidden; flex-shrink: 0; transition: 0.2s; cursor: pointer; user-select: none;
        }
        .logo-container:hover { opacity: 0.9; }
        .logo-container svg { width: 48px; height: 48px; }
        .logo-container img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .logo-container img.loaded { display: block; }
        .logo-container img.loaded + svg { display: none; }
        .logo-container .upload-hint {
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6);
            color: white; font-size: 0.55rem; text-align: center; padding: 2px 0;
            opacity: 0; transition: 0.2s; pointer-events: none; backdrop-filter: blur(4px);
            border-radius: 0 0 12px 12px; line-height: 1.2;
        }
        .logo-container:hover .upload-hint { opacity: 1; }
        .logo-text { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; color: white !important; }
        .logo-text span { font-weight: 300; opacity: 0.8; font-size: 0.7rem; margin-left: 0.3rem; }
        .topbar-right-actions { display: flex; align-items: center; gap: 0.8rem; }
        
        .sync-indicator {
            padding: 0.3rem 0.8rem; border-radius: 40px; font-size: 0.7rem; font-weight: 700; 
            display: flex; align-items: center; gap: 0.4rem; transition: 0.3s;
            background: #f1f5f9; color: #475569; border: none;
        }
        .sync-indicator.online { background: #dcfce7; color: #166534; }
        .sync-indicator.syncing { background: #fef08a; color: #854d0e; }
        .sync-indicator.error { background: #fee2e2; color: #991b1b; }

        .dark-mode-toggle { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 0.4rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 1rem; }

        .container { display: flex; max-width: 1440px; margin: 0 auto; width: 100%; padding: 1.5rem 2rem; gap: 2rem; flex: 1; }
        .sidebar {
            width: 280px; flex-shrink: 0; background: var(--menu-bg); border-radius: var(--radius);
            padding: 1.5rem 1rem; box-shadow: var(--sombra); height: fit-content; position: sticky;
            top: 90px; max-height: calc(100vh - 120px); overflow-y: auto;
        }
        .menu-search-box { position: relative; margin-bottom: 1rem; }
        .menu-search-box input { width: 100%; padding: 0.4rem 0.6rem 0.4rem 1.8rem; border-radius: 8px; border: 1px solid var(--cinza-claro); font-size: 0.85rem; background: transparent; color: inherit; }
        .menu-search-box i { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); font-size: 0.8rem; opacity: 0.5; }
        
        .sidebar h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #6B7280; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--cinza-claro); display: flex; justify-content: space-between; align-items: center; }
        .sidebar h3 .config-btn { background: none; border: none; cursor: pointer; font-size: 1rem; color: var(--azul); opacity: 0.5; transition: 0.2s; padding: 0.2rem 0.4rem; border-radius: 4px; }
        .sidebar h3 .config-btn:hover { opacity: 1; background: rgba(30, 70, 197, 0.08); }
        
        .sidebar nav { display: flex; flex-direction: column; gap: 0.25rem; }
        .sidebar nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.8rem; border-radius: 12px; color: inherit; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: 0.2s; border-left: 3px solid transparent; cursor: pointer; }
        .sidebar nav a i { width: 1.25rem; color: var(--azul); font-size: 1rem; text-align: center; opacity: 0.7; }
        .sidebar nav a:hover { background: rgba(30, 70, 197, 0.06); border-left-color: var(--azul); }
        .sidebar nav a.active { background: rgba(30, 70, 197, 0.08); border-left-color: var(--azul); font-weight: 600; }
        
        .main { flex: 1; min-width: 0; }
        .section { background: white; border-radius: var(--radius); padding: 2rem 2.2rem; margin-bottom: 2rem; box-shadow: var(--sombra); border: 1px solid rgba(30, 70, 197, 0.04); animation: fadeUp 0.5s ease both; scroll-margin-top: 80px; }
        
        .section h2 { color: var(--azul) !important; font-family: 'Poppins', sans-serif; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            z-index: 9999; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 20px; padding: 2rem 2.2rem; max-width: 580px; width: 95%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        
        .btn-group { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1rem; }
        .btn-confirm, .btn-salvar { background: var(--btn-color); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
        .btn-cancel { background: #E2E8F0; color: #475569; border: none; padding: 0.6rem 1.2rem; border-radius: 12px; font-weight: 600; cursor: pointer; }
        
        .modal-box input, .modal-box select, .modal-box textarea { width: 100%; padding: 0.6rem 0.8rem; border: 2px solid var(--cinza-claro); border-radius: 12px; font-size: 0.95rem; background: transparent; color: inherit; margin-bottom: 0.8rem; }
        
        #ft-toast-container { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10000; }
        .ft-toast { padding: 12px 20px; border-radius: 10px; color: white; font-weight: 500; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        
        .admin-controls-panel { display: none; background: #FFFBEB; border: 1px solid #FDE68A; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; gap: 10px; align-items: center; flex-wrap: wrap; }
        body.edit-mode-active .admin-controls-panel { display: flex; }
        
        .admin-action-btn { background: var(--azul); color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .admin-action-btn.secondary { background: #475569; }
        .admin-action-btn.danger { background: #EF4444; }
        
        .editable-field { outline: 2px dashed transparent; transition: 0.2s; }
        body.edit-mode-active .editable-field { outline: 2px dashed var(--azul); outline-offset: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="logo-wrapper">
            <div class="logo-container" id="logoContainer">
                <svg id="defaultLogo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" fill="#FFFFFF" stroke="#19F000" stroke-width="1.5" />
                    <text x="20" y="25" font-family="sans-serif" font-size="14" font-weight="800" fill="#1E46C5" text-anchor="middle">FT</text>
                </svg>
                <img id="uploadedLogo" alt="Logo" />
                <div class="upload-hint">🔒 Clique:<br>Painel Admin</div>
            </div>
            <div class="logo-text" id="manualBrandingName">NPS Fast Tennis <span>· Manual</span></div>
        </div>
        <div class="topbar-right-actions">
            <button id="syncIndicator" class="sync-indicator online"><i class="fas fa-cloud"></i> <span>Conectando...</span></button>
            <button class="dark-mode-toggle" id="btnDarkModeToggle">🌙</button>
            <div class="badge">We Help</div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="menu-search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="menuSearch" placeholder="Buscar no menu...">
            </div>
            <h3>Módulos <button class="config-btn" id="adminConfigTrigger"><i class="fas fa-cog"></i></button></h3>
            <nav id="sidebarNav"></nav>
        </aside>
        <main class="main">
            <div class="admin-controls-panel">
                <span><strong>Modo de Edição Ativo</strong></span>
                <button class="admin-action-btn" id="btnCriarModulo"><i class="fas fa-plus"></i> Novo Módulo</button>
                <button class="admin-action-btn" id="btnUploadImagens"><i class="fas fa-image"></i> Identidade Visual</button>
                <button class="admin-action-btn danger" id="btnSairAdmin">Sair da Edição</button>
            </div>
            <div id="mainContent"></div>
        </main>
    </div>

    <div class="modal-overlay" id="senhaModal">
        <div class="modal-box">
            <h3><i class="fas fa-lock"></i> Área do Administrador</h3>
            <p style="margin: 0.5rem 0 1rem; font-size: 0.9rem; opacity: 0.8;">Insira a sua senha de acesso para configurar o manual.</p>
            <input type="password" id="senhaInput" placeholder="Digite a senha padrão">
            <div class="btn-group">
                <button class="btn-cancel" id="btnCancelarSenha">Cancelar</button>
                <button class="btn-confirm" id="btnConfirmarSenha">Entrar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="moduloModal">
        <div class="modal-box">
            <h3 id="modalTitulo">Configurar Elemento</h3>
            <div style="text-align: left; margin-top: 1rem;">
                <label>Título:</label>
                <input type="text" id="inputModTitulo">
                <label>Ícone (Classe FontAwesome):</label>
                <input type="text" id="inputModIcon" placeholder="fa-bookmark">
                <label>Conteúdo em Texto:</label>
                <textarea id="inputModConteudo" rows="12"></textarea>
            </div>
            <div class="btn-group">
                <button class="btn-cancel" id="btnFecharModModal">Fechar</button>
                <button class="btn-salvar" id="btnSalvarModulo">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="midiaModal">
        <div class="modal-box">
            <h3>Gerenciador de Identidade Visual</h3>
            <div style="text-align: left; margin-top: 1rem; display: flex; flex-direction: column; gap: 10px;">
                <label>Logotipo do Topo:</label>
                <input type="file" id="fileLogo" accept="image/*">
                <label>Favicon do Manual (.ico ou .png):</label>
                <input type="file" id="fileFavicon" accept="image/*">
                <label>Imagem de Fundo Geral:</label>
                <input type="file" id="fileFundo" accept="image/*">
            </div>
            <div class="btn-group" style="margin-top: 1.5rem;">
                <button class="btn-cancel" id="btnFecharMidiaModal">Concluir</button>
            </div>
        </div>
    </div>

    <div id="ft-toast-container"></div>

    <script>
        const _SUPABASE_URL = "https://vymbwuvorpfycmhxejoa.supabase.co"; 
        const _SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5bWJ3dXZvcnBmeWNtaHhlam9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1OTc2NjMsImV4cCI6MjA5OTE3MzY2M30.aO4twzzkC4sUcuP_8Eq2bZdG49tvrJjWHOsUSqLPMb8"; 
        
        const supabaseClient = window.supabase.createClient(_SUPABASE_URL, _SUPABASE_KEY);

        // Banco de Dados Base Restaurado Diretamente do Backup Original
        let SGMState = {
            id: "manual_config_01",
            theme: "light",
            logoData: "",
            faviconData: "",
            bgData: "",
            modules: [
                { id: "mod_1", title: "Visão Geral", icon: "fa-home", content: "Fluxo de Pesquisa NPS\nObjetivo: Recolha contínua de feedback de clientes após pontos de contacto fundamentais (Ex: Compra, Instalação, Suporte), permitindo ações rápidas de correção (Loop Fechado) e melhoria estratégica de processos." },
                { id: "mod_2", title: "Fluxo de Trabalho", icon: "fa-tasks", content: "Etapas Principais:\n1. Preparação da Base de Clientes (Extração e Higienização)\n2. Disparo dos Convites (E-mail, SMS ou WhatsApp)\n3. Coleta e Análise das Respostas em Tempo Real\n4. Tratamento de Detratores (Ações Imediatas)" },
                { id: "mod_3", title: "Sistemas", icon: "fa-link", content: "Ferramentas Utilizadas:\n• Plataforma de Disparos Integrada (API Fast Tennis)\n• Base CRM Interna para validação de dados de clientes\n• Painel Supabase para armazenamento e sincronização de dados" },
                { id: "mod_4", title: "Cronograma", icon: "fa-clock", content: "Frequência de Atualização:\n• Extração diária de bases de vendas às 08:00\n• Disparo automatizado de pesquisas às 11:30\n• Relatórios parciais de acompanhamento todas as sextas-feiras" },
                { id: "mod_5", title: "Preparação da Base", icon: "fa-database", content: "Regras de Ouro para a Base:\n• Remover e-mails duplicados e inválidos\n• Filtrar clientes que responderam a pesquisas nos últimos 30 dias (Regra de Quarentena)\n• Garantir a codificação correta de caracteres especiais (UTF-8)" },
                { id: "mod_6", title: "Disparo da Pesquisa", icon: "fa-paper-plane", content: "Boas Práticas de Disparo:\n• Remetente confiável e reconhecível (Ex: Pesquisa Fast Tennis)\n• Assunto curto, claro e direto ao ponto\n• Link da pesquisa destacado e responsivo para telemóveis" },
                { id: "mod_7", title: "B2B Implantação", icon: "fa-building", content: "Particularidades Corporativas:\n• Mapeamento de múltiplos decisores dentro da mesma conta\n• Abordagem consultiva com acompanhamento do Gestor de Conta (KAM)\n• Análise de NPS por volume de faturamento e criticidade do cliente" }
            ]
        };

        let isAdmin = false;
        let saveTimeout = null;
        let moduloEditandoId = null;

        function showToast(text, bg = "#10B981") {
            const container = document.getElementById('ft-toast-container');
            const toast = document.createElement('div');
            toast.className = "ft-toast";
            toast.style.background = bg;
            toast.innerText = text;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateSyncIndicator(status) {
            const el = document.getElementById('syncIndicator');
            if(!el) return;
            const s = el.querySelector('span');
            const i = el.querySelector('i');
            
            if (status === 'saved') {
                el.className = "sync-indicator online";
                s.innerText = "Sincronizado";
                i.className = "fas fa-cloud";
            } else if (status === 'saving') {
                el.className = "sync-indicator syncing";
                s.innerText = "Salvando...";
                i.className = "fas fa-sync fa-spin";
            } else {
                el.className = "sync-indicator error";
                s.innerText = "Erro ao salvar";
                i.className = "fas fa-exclamation-triangle";
            }
        }

        async function loadData() {
            updateSyncIndicator('saving');
            try {
                // Nome corrigido para bater com a tabela exata do seu Supabase: manual_configs
                const { data, error } = await supabaseClient
                    .from('manual_configs')
                    .select('content')
                    .eq('id', SGMState.id)
                    .single();

                if (data && data.content && data.content.modules && data.content.modules.length > 0) {
                    SGMState = data.content;
                } else {
                    await saveDataCloud();
                }
                updateSyncIndicator('saved');
            } catch(e) {
                console.error(e);
                updateSyncIndicator('saved');
            }
            renderApp();
        }

        async function saveDataCloud() {
            updateSyncIndicator('saving');
            try {
                const { error } = await supabaseClient
                    .from('manual_configs')
                    .upsert({ id: SGMState.id, content: SGMState, updated_at: new Date().toISOString() });
                if(error) throw error;
                updateSyncIndicator('saved');
            } catch(e) {
                updateSyncIndicator('error');
            }
        }

        function triggerDebounceSave() {
            if(saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveDataCloud();
            }, 800);
        }

        function renderApp() {
            const imgLogo = document.getElementById('uploadedLogo');
            if(SGMState.logoData) {
                imgLogo.src = SGMState.logoData;
                imgLogo.classList.add('loaded');
            } else {
                imgLogo.classList.remove('loaded');
            }

            if(SGMState.bgData) {
                document.documentElement.style.setProperty('--bg-custom-image', `url(${SGMState.bgData})`);
            } else {
                document.documentElement.style.setProperty('--bg-custom-image', 'none');
            }

            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = "";
            SGMState.modules.forEach((mod, idx) => {
                const a = document.createElement('a');
                a.innerHTML = `<i class="fas ${mod.icon || 'fa-folder'}"></i> ${mod.title}`;
                a.onclick = () => carregarModuloNoCentro(mod.id);
                if(idx === 0) a.className = "active";
                nav.appendChild(a);
            });

            if(SGMState.modules.length > 0) {
                carregarModuloNoCentro(SGMState.modules[0].id);
            }
        }

        function carregarModuloNoCentro(id) {
            const mod = SGMState.modules.find(m => m.id === id);
            const main = document.getElementById('mainContent');
            
            document.querySelectorAll('#sidebarNav a').forEach(a => {
                a.classList.toggle('active', a.innerText.trim() === mod.title.trim());
            });

            if(!mod) return;

            main.innerHTML = `
                <div class="section">
                    <h2 class="${isAdmin ? 'editable-field' : ''}" onclick="abrirConfigElemento('${mod.id}')">
                        <i class="fas ${mod.icon || 'fa-file-alt'}"></i> <span>${mod.title}</span>
                    </h2>
                    <div style="margin-top:1.2rem;">
                        <div class="${isAdmin ? 'editable-field' : ''}" style="white-space: pre-wrap; font-size:1rem; line-height:1.75; color:inherit;" onclick="abrirConfigElemento('${mod.id}')">${mod.content || 'Sem conteúdo.'}</div>
                    </div>
                    ${isAdmin ? `<button class="admin-action-btn danger" style="margin-top:25px; font-size:0.75rem;" onclick="deletarModulo('${mod.id}')"><i class="fas fa-trash"></i> Excluir Módulo</button>` : ''}
                </div>
            `;
        }

        function abrirConfigElemento(id) {
            if(!isAdmin) return;
            moduloEditandoId = id;
            const mod = SGMState.modules.find(m => m.id === id);
            if(!mod) return;

            document.getElementById('modalTitulo').innerText = "Editar Módulo";
            document.getElementById('inputModTitulo').value = mod.title;
            document.getElementById('inputModIcon').value = mod.icon || 'fa-file-alt';
            document.getElementById('inputModConteudo').value = mod.content || '';
            
            document.getElementById('moduloModal').classList.add('active');
        }

        function deletarModulo(id) {
            if(!confirm("Tem certeza que deseja apagar este módulo?")) return;
            SGMState.modules = SGMState.modules.filter(m => m.id !== id);
            saveDataCloud();
            renderApp();
            showToast("Módulo removido.");
        }

        function handleImageUpload(inputEl, stateProperty) {
            const file = inputEl.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                SGMState[stateProperty] = e.target.result;
                saveDataCloud();
                renderApp();
                showToast("Identidade visual atualizada!");
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('logoContainer').onclick = () => {
            if(!isAdmin) document.getElementById('senhaModal').classList.add('active');
        };
        document.getElementById('adminConfigTrigger').onclick = () => {
            if(!isAdmin) document.getElementById('senhaModal').classList.add('active');
        };

        document.getElementById('btnCancelarSenha').onclick = () => {
            document.getElementById('senhaModal').classList.remove('active');
            document.getElementById('senhaInput').value = "";
        };

        document.getElementById('btnConfirmarSenha').onclick = () => {
            const senha = document.getElementById('senhaInput').value;
            if(senha === "123" || senha.toLowerCase() === "admin") {
                isAdmin = true;
                document.body.classList.add('edit-mode-active');
                document.getElementById('senhaModal').classList.remove('active');
                document.getElementById('senhaInput').value = "";
                renderApp();
                showToast("Modo de Edição Ativado!");
            } else {
                showToast("Senha incorreta!", "#EF4444");
            }
        };

        document.getElementById('btnSairAdmin').onclick = () => {
            isAdmin = false;
            document.body.classList.remove('edit-mode-active');
            renderApp();
            showToast("Saiu do modo editor.", "#475569");
        };

        document.getElementById('btnCriarModulo').onclick = () => {
            moduloEditandoId = null;
            document.getElementById('modalTitulo').innerText = "Criar Novo Módulo";
            document.getElementById('inputModTitulo').value = "";
            document.getElementById('inputModIcon').value = "fa-file-alt";
            document.getElementById('inputModConteudo').value = "";
            document.getElementById('moduloModal').classList.add('active');
        };

        document.getElementById('btnFecharModModal').onclick = () => {
            document.getElementById('moduloModal').classList.remove('active');
        };

        document.getElementById('btnSalvarModulo').onclick = () => {
            const t = document.getElementById('inputModTitulo').value.trim();
            const i = document.getElementById('inputModIcon').value.trim();
            const c = document.getElementById('inputModConteudo').value.trim();

            if(!t) { showToast("O título é obrigatório", "#EF4444"); return; }

            if(moduloEditandoId) {
                const mod = SGMState.modules.find(m => m.id === moduloEditandoId);
                if(mod) { mod.title = t; mod.icon = i; mod.content = c; }
            } else {
                const newId = "mod_" + Date.now();
                SGMState.modules.push({ id: newId, title: t, icon: i, content: c });
            }

            document.getElementById('moduloModal').classList.remove('active');
            saveDataCloud();
            renderApp();
            showToast("Alterações guardadas com sucesso!");
        };

        document.getElementById('btnUploadImagens').onclick = () => {
            document.getElementById('midiaModal').classList.add('active');
        };
        document.getElementById('btnFecharMidiaModal').onclick = () => {
            document.getElementById('midiaModal').classList.remove('active');
        };

        document.getElementById('fileLogo').onchange = function() { handleImageUpload(this, 'logoData'); };
        document.getElementById('fileFavicon').onchange = function() { handleImageUpload(this, 'faviconData'); };
        document.getElementById('fileFundo').onchange = function() { handleImageUpload(this, 'bgData'); };

        document.getElementById('menuSearch').oninput = function() {
            const val = this.value.toLowerCase();
            document.querySelectorAll('#sidebarNav a').forEach(a => {
                const text = a.innerText.toLowerCase();
                a.style.display = text.includes(val) ? "flex" : "none";
            });
        };

        document.getElementById('btnDarkModeToggle').onclick = () => {
            const isDark = document.body.classList.toggle('dark-theme');
            SGMState.theme = isDark ? 'dark' : 'light';
            document.getElementById('btnDarkModeToggle').innerText = isDark ? '☀️' : '🌙';
            triggerDebounceSave();
        };

        window.onload = () => {
            loadData();
        };
    </script>
</body>
</html>
